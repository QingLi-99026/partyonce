name: Auto Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Render
      # 使用 Render Deploy Hook 自动部署
      # 无需 API Key，只需要 Deploy Hook URL
      run: |
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
          echo "Triggering Render deployment..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deployment triggered!"
        else
          echo "RENDER_DEPLOY_HOOK not set. Skipping deployment."
          echo "Please set RENDER_DEPLOY_HOOK in GitHub Secrets."
        fi
