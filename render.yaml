# Render Blueprint 配置
# 放在仓库根目录，Render 会自动识别并部署

services:
  - type: web
    name: partyonce-prod
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true  # 关键：每次 git push 自动部署
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: partyonce-mysql
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: partyonce-mysql
    databaseName: partyonce_prod
    user: root
    plan: free
    region: singapore
